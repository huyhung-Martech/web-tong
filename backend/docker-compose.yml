version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: salepro_postgres
    environment:
      POSTGRES_USER: salepro
      POSTGRES_PASSWORD: salepro_pass
      POSTGRES_DB: salepro_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
